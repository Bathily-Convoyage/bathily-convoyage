<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap');

    :root {
      --bordeaux: #0A4D68;
      --bordeaux-dark: #063244;
      --warning: #F5A623;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      position: relative;
      background-color: var(--bordeaux-dark);
    }

    #bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(6, 50, 68, 1) 0%, rgba(6, 50, 68, 0.7) 40%, rgba(6, 50, 68, 0.1) 100%);
      z-index: 2;
    }

    #content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 80px;
      z-index: 3;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .badge {
      background-color: var(--warning);
      color: var(--bordeaux-dark);
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      width: fit-content;
    }

    #title {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.2;
      text-transform: uppercase;
      text-wrap: balance;
      text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .footer {
      display: flex;
      justify-items: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      border-top: 2px solid rgba(255,255,255,0.2);
      padding-top: 40px;
    }

    .footer-text {
      font-family: 'Open Sans', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #E6F0F4;
    }

    .logo-box {
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box img {
      height: 40px;
    }
  </style>
</head>
<body>
  <div id="bg-image" style="background-image: url('https://www.bathily-convoyage.fr/social-media/josh-berquist-_4sWbzH5fp8-unsplash.jpg');"></div>
  <div id="overlay"></div>
  
  <div id="content">
    <div class="badge">Convoyage Premium</div>
    <div id="title">Vous voyagez, on s'occupe de tout.</div>
    
    <div class="footer">
      <div class="logo-box">
        <img src="https://www.bathily-convoyage.fr/assets/images/logo_bathily.png" alt="Bathily Convoyage">
      </div>
      <div class="footer-text">www.bathily-convoyage.fr</div>
    </div>
  </div>

  <script>
    // Ces fonctions seront appelées par Puppeteer
    function setContent(imageUrl, titleText) {
      if (imageUrl) {
        document.getElementById('bg-image').style.backgroundImage = `url('${imageUrl}')`;
      }
      if (titleText) {
        document.getElementById('title').textContent = titleText;
      }
    }
  </script>
</body>
</html>
