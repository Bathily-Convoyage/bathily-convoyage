<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offre Juillet Bathily-Convoyage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0A4D68;
      --primary-dark: #063244;
      --secondary: #088395;
      --accent: #F5A623;
      --cream: #FDFBF7;
      --text: #2D2A24;
      --muted: #6B625A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--cream);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: 1080px;
      height: 1080px;
      background:
        radial-gradient(circle at 85% 15%, rgba(245,166,35,0.16), transparent 30%),
        radial-gradient(circle at 15% 85%, rgba(8,131,149,0.16), transparent 30%),
        linear-gradient(135deg, #fffaf0 0%, var(--cream) 46%, #f6efe4 100%);
      border-radius: 48px;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
    }
    .logo { width: 80px; height: 80px; object-fit: contain; border-radius: 20px; }
    .brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }
    .brand p {
      font-size: 16px;
      color: var(--muted);
      margin-top: 8px;
    }
    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: var(--primary-dark);
      line-height: 1.05;
      margin-bottom: 48px;
    }
    .title span { color: var(--accent); }
    .offer {
      padding: 48px;
      border-radius: 32px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 12px 32px rgba(10,77,104,0.18);
    }
    .discount {
      font-family: 'Montserrat', sans-serif;
      font-size: 96px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
    }
    .offer p {
      font-size: 28px;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .code {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      background: var(--accent);
      color: var(--primary-dark);
      padding: 16px 32px;
      border-radius: 16px;
      display: inline-block;
    }
    .footer {
      position: absolute;
      bottom: 40px;
      left: 60px;
      right: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 2px solid rgba(10,77,104,0.12);
    }
    .footer p { font-size: 16px; color: var(--muted); }
    .footer strong { color: var(--primary); font-weight: 800; }
    .cta {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="../../logo.png" alt="Bathily-Convoyage" class="logo">
      <div class="brand">
        <h1>Bathily Convoyage</h1>
        <p>Auto & moto France</p>
      </div>
    </div>
    <h2 class="title">Offre <span>spéciale</span></h2>
    <div class="offer">
      <div class="discount">-10%</div>
      <p>Sur votre premier convoyage avec le code ETE2026.</p>
      <p>Valable jusqu’au 31 juillet 2026.</p>
      <div class="code">ETE2026</div>
    </div>
    <div class="footer">
      <p>📞 <strong>07 58 36 22 49</strong> | ✉️ contact@bathily-convoyage.fr</p>
      <p class="cta">Utilisez le code ETE2026 maintenant !</p>
    </div>
  </div>
</body>
</html>
