<!DOCTYPEml>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Plaquette Bathily-Convoyage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0A4D68;
      --primary-dark: #063244;
      --secondary: #088395;
      --accent: #F5A623;
      --cream: #FDFBF7;
      --text: #2D2A24;
      --muted: #6B625A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--cream);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: 1080px;
      height: 1920px;
      background:
        radial-gradient(circle at 85% 15%, rgba(245,166,35,0.16), transparent 30%),
        radial-gradient(circle at 15% 85%, rgba(8,131,149,0.16), transparent 30%),
        linear-gradient(135deg, #fffaf0 0%, var(--cream) 46%, #f6efe4 100%);
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 60px;
    }
    .logo { width: 120px; height: 120px; object-fit: contain; border-radius: 30px; }
    .brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }
    .brand p {
      font-size: 24px;
      color: var(--muted);
      margin-top: 12px;
    }
    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 96px;
      font-weight: 900;
      color: var(--primary-dark);
      line-height: 1.05;
      margin-bottom: 60px;
    }
    .title span { color: var(--secondary); }
    .content {
      padding: 60px;
      border-radius: 40px;
      background: rgba(255,255,255,0.8);
      border: 2px solid rgba(10,77,104,0.12);
      box-shadow: 0 12px 32px rgba(10,77,104,0.08);
    }
    .content p {
      font-size: 36px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .content strong { color: var(--primary); font-weight: 800; }
    .swipe {
      font-family: 'Montserrat', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
      margin-top: 40px;
    }
    .footer {
      position: absolute;
      bottom: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 32px;
      border-top: 2px solid rgba(10,77,104,0.12);
    }
    .footer p { font-size: 24px; color: var(--muted); }
    .footer strong { color: var(--primary); font-weight: 800; }
    .cta {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="../../logo.png" alt="Bathily-Convoyage" class="logo">
      <div class="brand">
        <h1>Bathily Convoyage</h1>
        <p>Auto & moto France</p>
      </div>
    </div>
    <h2 class="title">Plaquette <span>commerciale</span></h2>
    <div class="content">
      <p><strong>Swipe pour voir</strong> notre plaquette commerciale.</p>
      <p>3 packs : Starter, Sérénité, Excellence.</p>
      <p>Suivi GPS, état des lieux photo.</p>
      <div class="swipe">Swipe ↓</div>
    </div>
    <div class="footer">
      <p>📞 <strong>07 58 36 22 49</strong></p>
      <p class="cta">Scanner QR code</p>
    </div>
  </div>
</body>
</html>
