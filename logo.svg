<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180" role="img" aria-label="Bathily-Convoyage">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4D68"/>
      <stop offset="100%" stop-color="#088395"/>
    </linearGradient>
  </defs>

  <!-- ===== HEXAGONE ===== -->
  <g transform="translate(15, 15)">
    <polygon points="60,0 120,34.64 120,103.92 60,138.56 0,103.92 0,34.64" fill="url(#hexGrad)" stroke="#F5A623" stroke-width="3.5"/>

    <!-- Voiture (bleu primaire, style original) -->
    <g transform="translate(12, 48)">
      <path d="M3,30 Q3,23 10,23 L17,23 L22,15 Q25,11 30,11 L42,11 Q47,11 50,15 L55,23 L62,23 Q69,23 69,30 L69,37 Q69,39 67,39 L63,39 Q62,44 57,44 Q52,44 51,39 L21,39 Q20,44 15,44 Q10,44 9,39 L5,39 Q3,39 3,37 Z"
            fill="#0A4D68" stroke="#F5A623" stroke-width="1.2"/>
      <circle cx="15" cy="39" r="5" fill="#088395" stroke="#F5A623" stroke-width="1"/>
      <circle cx="57" cy="39" r="5" fill="#088395" stroke="#F5A623" stroke-width="1"/>
      <circle cx="15" cy="39" r="2.2" fill="#F5A623"/>
      <circle cx="57" cy="39" r="2.2" fill="#F5A623"/>
      <path d="M25,14 L29,14 L29,22 L23,22 Z" fill="#ffffff" opacity="0.75"/>
      <path d="M31,14 L41,14 Q44,14 45,17 L46,22 L31,22 Z" fill="#ffffff" opacity="0.55"/>
      <circle cx="67" cy="30" r="1.8" fill="#F5A623"/>
    </g>

    <!-- Moto (à droite de la voiture, même style) -->
    <g transform="translate(68, 48)">
      <circle cx="6" cy="42" r="8" fill="none" stroke="#F5A623" stroke-width="2.8"/>
      <circle cx="6" cy="42" r="3.5" fill="#F5A623"/>
      <circle cx="44" cy="42" r="8" fill="none" stroke="#F5A623" stroke-width="2.8"/>
      <circle cx="44" cy="42" r="3.5" fill="#F5A623"/>
      <path d="M6,42 L13,30 L20,28 L32,28 L38,33 L44,42" fill="none" stroke="#0A4D68" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M17,30 Q22,25 29,25 L34,25 Q37,25 37,30 L32,30 Z" fill="#0A4D68" stroke="#F5A623" stroke-width="0.8"/>
      <path d="M38,33 L42,26 L47,26" fill="none" stroke="#0A4D68" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M13,30 Q15,26 20,26 L22,30" fill="none" stroke="#0A4D68" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="46" cy="35" r="2.2" fill="#F5A623"/>
    </g>
  </g>

  <!-- ===== TEXTE ===== -->
  <g transform="translate(160, 0)">
    <text x="0" y="62" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" fill="#0A4D68" letter-spacing="-0.5">BATHILY</text>
    <text x="0" y="96" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" fill="#088395" letter-spacing="-0.5">CONVOYAGE</text>
    <circle cx="232" cy="88" r="5.5" fill="#F5A623"/>
    <text x="0" y="120" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" fill="#6B625A" letter-spacing="2.5">CONVOYAGE AUTO &amp; MOTO</text>
    <line x1="0" y1="130" x2="130" y2="130" stroke="#F5A623" stroke-width="2.5"/>
  </g>
</svg>
