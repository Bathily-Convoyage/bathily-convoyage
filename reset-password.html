<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Bathily-Convoyage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FDFBF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #E8E1D9;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #0A4D68;
      margin-bottom: 8px;
    }
    .logo span { color: #6B625A; font-weight: 500; font-size: 0.8rem; display: block; margin-top: 4px; }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #2D2A24;
      margin: 24px 0 8px;
    }
    p { font-size: 0.85rem; color: #6B625A; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; text-align: left; }
    label { font-size: 0.78rem; font-weight: 600; color: #2D2A24; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E8E1D9;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0A4D68; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0A4D68;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #063244; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 0.8rem; margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Bathily-Convoyage<span>.</span><span>Réinitialisation</span></div>
    <h1>Nouveau mot de passe</h1>
    <p>Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>

    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPassword" placeholder="Minimum 8 caractères" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" autocomplete="new-password">
    </div>

    <button class="btn" id="submitBtn" disabled onclick="updatePassword()">Enregistrer le mot de passe</button>
    <div class="error" id="errorMsg"></div>
    <div id="statusMessage" style="margin-top: 12px; font-size: 0.8rem; color: #6B625A;">⏳ Vérification du lien...</div>
  </div>

  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    let _recoveryReady = false;
    let _timeoutFired = false;

    // Supabase v2 : onAuthStateChange détecte PASSWORD_RECOVERY automatiquement
    // Que ce soit le flow PKCE (?code=...) ou implicite (#access_token=...),
    // le SDK initialise la session et déclenche cet événement.
    client.auth.onAuthStateChange((event, session) => {
      _timeoutFired = true; // Annuler le timeout d'erreur
      if (event === 'PASSWORD_RECOVERY' && session) {
        _recoveryReady = true;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('statusMessage').innerHTML = '✅ Session valide. Vous pouvez modifier votre mot de passe.';
        document.getElementById('errorMsg').textContent = '';
      } else if (event === 'INITIAL_SESSION' && session) {
        // Une session existante a été restaurée
        _recoveryReady = true;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('statusMessage').innerHTML = '✅ Session valide. Vous pouvez modifier votre mot de passe.';
      } else if (event === 'SIGNED_OUT') {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('statusMessage').innerHTML = '⚠️ Session expirée.';
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const hash = window.location.hash;
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      // Vérifier s'il y a déjà une session active
      try {
        const { data: { session } } = await client.auth.getSession();
        if (session) {
          _recoveryReady = true;
          _timeoutFired = true;
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('statusMessage').innerHTML = '✅ Session valide. Vous pouvez modifier votre mot de passe.';
          return;
        }
      } catch (e) {
        // Pas de session, c'est normal
      }

      // Flow PKCE : il y a un paramètre "code" dans l'URL
      if (code) {
        try {
          const { data, error } = await client.auth.exchangeCodeForSession(window.location.href);
          if (error) {
            document.getElementById('errorMsg').textContent = 'Erreur : ' + error.message;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('statusMessage').innerHTML = '❌ Session invalide.';
          }
          // exchangeCodeForSession va déclencher onAuthStateChange(PASSWORD_RECOVERY)
        } catch (err) {
          document.getElementById('errorMsg').textContent = 'Erreur : ' + (err.message || 'Lien invalide.');
          document.getElementById('submitBtn').disabled = true;
          document.getElementById('statusMessage').innerHTML = '❌ Session invalide.';
        }
        return;
      }

      // Flow implicite : il y a access_token dans le hash (#access_token=...)
      // Le SDK Supabase v2 détecte automatiquement le hash et déclenche onAuthStateChange
      if (hash && hash.includes('access_token')) {
        // Le SDK gère ça automatiquement, on attend juste l'événement onAuthStateChange
        // Donner un délai de 3 secondes pour que l'événement se déclenche
        setTimeout(() => {
          if (!_recoveryReady) {
            // Le SDK n'a pas réussi à restaurer la session automatiquement
            // Essayer manuellement avec setSession
            try {
              const hashParams = new URLSearchParams(hash.substring(1));
              const accessToken = hashParams.get('access_token');
              const refreshToken = hashParams.get('refresh_token') || '';
              if (accessToken) {
                client.auth.setSession({
                  access_token: accessToken,
                  refresh_token: refreshToken
                }).then(({ data, error }) => {
                  if (error || !data?.session) {
                    document.getElementById('errorMsg').textContent = 'Lien de réinitialisation invalide ou expiré.';
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('statusMessage').innerHTML = '❌ Session invalide.';
                  } else {
                    _recoveryReady = true;
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('statusMessage').innerHTML = '✅ Session valide. Vous pouvez modifier votre mot de passe.';
                  }
                });
              }
            } catch (e) {
              document.getElementById('errorMsg').textContent = 'Erreur : ' + e.message;
              document.getElementById('statusMessage').innerHTML = '❌ Session invalide.';
            }
          }
        }, 2000);
        return;
      }

      // Ni code ni token — attendre 3s au cas où le SDK détecte quelque chose, puis afficher l'erreur
      setTimeout(() => {
        if (!_recoveryReady) {
          document.getElementById('errorMsg').textContent = 'Lien de réinitialisation invalide ou expiré. Veuillez refaire une demande.';
          document.getElementById('submitBtn').disabled = true;
          document.getElementById('statusMessage').innerHTML = '❌ Token manquant.';
        }
      }, 3000);
    });

    async function updatePassword() {
      const pwd = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorEl.textContent = '';

      if (pwd.length < 8) {
        errorEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
        return;
      }
      if (pwd !== confirmPwd) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      if (!_recoveryReady) {
        errorEl.textContent = 'Session expirée. Veuillez refaire une demande de réinitialisation.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      try {
        const { error } = await client.auth.updateUser({ password: pwd });

        if (error) {
          errorEl.textContent = 'Erreur : ' + error.message;
          btn.disabled = false;
          btn.textContent = 'Enregistrer le mot de passe';
          return;
        }

        Swal.fire({
          title: 'Mot de passe mis à jour !',
          text: 'Vous allez être redirigé vers votre espace.',
          icon: 'success',
          timer: 2500,
          showConfirmButton: false
        }).then(() => {
          const referrer = document.referrer;
          if (referrer.includes('dashboard-client')) {
            window.location.href = '/dashboard-client.html';
          } else {
            window.location.href = '/dashboard-convoyeur.html';
          }
        });
      } catch (err) {
        errorEl.textContent = 'Erreur inattendue : ' + (err.message || '');
        btn.disabled = false;
        btn.textContent = 'Enregistrer le mot de passe';
      }
    }
  </script>
</body>
</html>
