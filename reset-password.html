<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Bathily-Convoyage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FDFBF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #E8E1D9;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #0A4D68;
      margin-bottom: 8px;
    }
    .logo span { color: #6B625A; font-weight: 500; font-size: 0.8rem; display: block; margin-top: 4px; }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #2D2A24;
      margin: 24px 0 8px;
    }
    p { font-size: 0.85rem; color: #6B625A; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; text-align: left; }
    label { font-size: 0.78rem; font-weight: 600; color: #2D2A24; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E8E1D9;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0A4D68; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0A4D68;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #063244; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 0.8rem; margin-top: 8px; }
    .loading { display: inline-block; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Bathily-Convoyage<span>.</span><span>Espace convoyeur</span></div>
    <h1>Nouveau mot de passe</h1>
    <p>Choisissez un nouveau mot de passe sécurisé pour votre compte convoyeur.</p>

    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPassword" placeholder="Minimum 8 caractčres" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" autocomplete="new-password">
    </div>

    <button class="btn" id="submitBtn" disabled onclick="updatePassword()">Enregistrer le mot de passe</button>
    <div class="error" id="errorMsg"></div>
    <div id="statusMessage" style="margin-top: 12px; font-size: 0.8rem; color: var(--gray-mid);"></div>
  </div>

  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Récupérer le token depuis l'URL (fragment #access_token ou query string)
    async function recoverSession() {
      const hash = window.location.hash;
      const params = new URLSearchParams(window.location.search);
      
      // Supabase utilise #access_token dans l'URL aprčs le clic sur le lien de réinitialisation
      let accessToken = null;
      if (hash) {
        // Extraire le token du hash
        const hashParams = new URLSearchParams(hash.substring(1));
        accessToken = hashParams.get('access_token');
      }
      
      // Fallback : recherche dans la query string
      if (!accessToken) {
        accessToken = params.get('access_token');
      }

      if (!accessToken) {
        document.getElementById('errorMsg').textContent = 'Lien de réinitialisation invalide ou expiré. Veuillez refaire une demande.';
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('statusMessage').innerHTML = '?? Token manquant.';
        return false;
      }

      // Tenter de rétablir la session avec le token
      try {
        const { data, error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: '' // Le refresh token n'est pas nécessaire pour cette étape
        });

        if (error) {
          throw error;
        }

        if (data && data.user) {
          // Session rétablie
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('statusMessage').innerHTML = '? Session valide. Vous pouvez modifier votre mot de passe.';
          document.getElementById('errorMsg').textContent = '';
          return true;
        } else {
          throw new Error('Impossible de rétablir la session.');
        }
      } catch (err) {
        document.getElementById('errorMsg').textContent = 'Erreur : ' + (err.message || 'Lien invalide ou expiré.');
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('statusMessage').innerHTML = '? Session invalide.';
        return false;
      }
    }

    // Vérifier également l'état de l'authentification via onAuthStateChange
    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' && session) {
        // Le token a été reconnu par Supabase, activer le bouton
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('statusMessage').innerHTML = '? Session valide. Vous pouvez modifier votre mot de passe.';
        document.getElementById('errorMsg').textContent = '';
      } else if (event === 'SIGNED_OUT') {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('statusMessage').innerHTML = '?? Vous ętes déconnecté.';
      }
    });

    // Récupérer la session au chargement de la page
    document.addEventListener('DOMContentLoaded', async () => {
      // D'abord, essayer de récupérer la session existante (si l'utilisateur est déjŕ connecté)
      const { data: { session } } = await client.auth.getSession();
      if (session) {
        // Si une session existe déjŕ, activer le bouton (cela peut arriver si l'utilisateur est déjŕ connecté)
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('statusMessage').innerHTML = '? Session existante. Vous pouvez modifier votre mot de passe.';
        return;
      }

      // Sinon, tenter de récupérer le token depuis l'URL
      await recoverSession();
    });

    async function updatePassword() {
      const pwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorEl.textContent = '';

      if (pwd.length < 8) {
        errorEl.textContent = 'Le mot de passe doit contenir au moins 8 caractčres.';
        return;
      }
      if (pwd !== confirm) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      // Vérifier que l'utilisateur est bien authentifié avant de procéder
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        errorEl.textContent = 'Session expirée. Veuillez refaire une demande de réinitialisation.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      try {
        const { error } = await client.auth.updateUser({ password: pwd });

        if (error) {
          errorEl.textContent = 'Erreur : ' + error.message;
          btn.disabled = false;
          btn.textContent = 'Enregistrer le mot de passe';
          return;
        }

        Swal.fire({
          title: 'Mot de passe mis ŕ jour !',
          text: 'Vous allez ętre redirigé vers votre espace convoyeur.',
          icon: 'success',
          timer: 2500,
          showConfirmButton: false
        }).then(() => {
          window.location.href = '/dashboard-convoyeur.html';
        });
      } catch (err) {
        errorEl.textContent = 'Erreur inattendue : ' + (err.message || '');
        btn.disabled = false;
        btn.textContent = 'Enregistrer le mot de passe';
      }
    }
  </script>
</body>
</html>
