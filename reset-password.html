<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png"><link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A4D68">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Nouveau mot de passe — Bathily-Convoyage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FDFBF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #E8E1D9;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #0A4D68;
      margin-bottom: 8px;
    }
    .logo span { color: #6B625A; font-weight: 500; font-size: 0.8rem; display: block; margin-top: 4px; }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #2D2A24;
      margin: 24px 0 8px;
    }
    p { font-size: 0.85rem; color: #6B625A; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; text-align: left; }
    label { font-size: 0.78rem; font-weight: 600; color: #2D2A24; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E8E1D9;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0A4D68; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0A4D68;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #063244; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 0.8rem; margin-top: 8px; }
    .debug { font-size: 0.7rem; color: #999; margin-top: 12px; word-break: break-all; text-align: left; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/logo.png" alt="Bathily-Convoyage" style="height:48px;" /><span style="display:none">Réinitialisation</span></div>
    <h1>Nouveau mot de passe</h1>
    <p>Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>

    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPassword" placeholder="Minimum 8 caractères" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" autocomplete="new-password">
    </div>

    <button class="btn" id="submitBtn" disabled onclick="updatePassword()">Enregistrer le mot de passe</button>
    <div class="error" id="errorMsg"></div>
    <div id="statusMessage" style="margin-top: 12px; font-size: 0.8rem; color: #6B625A;">⏳ Vérification du lien...</div>
    <div class="debug" id="debugInfo"></div>
  </div>

  <script>
    if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
      document.getElementById('statusMessage').innerHTML = '❌ Erreur de configuration. supabase-config.js non chargé.';
      document.getElementById('submitBtn').disabled = true;
    }
    const client = window.SUPABASE_URL ? supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

    let _recoveryReady = false;

    function setStatus(msg) {
      document.getElementById('statusMessage').innerHTML = msg;
    }

    function enableForm() {
      _recoveryReady = true;
      document.getElementById('submitBtn').disabled = false;
      setStatus('✅ Session valide. Vous pouvez modifier votre mot de passe.');
      document.getElementById('errorMsg').textContent = '';
    }

    function disableForm(msg) {
      document.getElementById('submitBtn').disabled = true;
      setStatus('❌ ' + msg);
    }

    function logDebug(msg) {
      const el = document.getElementById('debugInfo');
      el.textContent += msg + '\n';
    }

    // Écouter PASSWORD_RECOVERY de Supabase
    client.auth.onAuthStateChange((event, session) => {
      logDebug('Auth event: ' + event + ', session: ' + (session ? 'YES' : 'NO'));
      if ((event === 'PASSWORD_RECOVERY' || event === 'INITIAL_SESSION') && session) {
        enableForm();
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const fullUrl = window.location.href;
      const hash = window.location.hash;
      const search = window.location.search;
      const params = new URLSearchParams(search);
      const hashParams = new URLSearchParams(hash.substring(1));

      logDebug('URL: ' + fullUrl);
      logDebug('hash: ' + hash);

      const code = params.get('code');
      const hashAccessToken = hashParams.get('access_token');
      const hashRefreshToken = hashParams.get('refresh_token');
      const hashType = hashParams.get('type');
      const queryToken = params.get('token');
      const queryType = params.get('type');

      logDebug('code: ' + (code ? 'YES' : 'NO'));
      logDebug('hashAccessToken: ' + (hashAccessToken ? 'YES (' + hashAccessToken.length + ' chars)' : 'NO'));
      logDebug('hashType: ' + (hashType || 'NO'));

      // 1. Vérifier session existante
      try {
        const { data: { session } } = await client.auth.getSession();
        if (session) {
          logDebug('Session existante trouvée');
          enableForm();
          return;
        }
      } catch (e) {
        logDebug('Pas de session: ' + e.message);
      }

      // 2. Flow PKCE : ?code=...
      if (code) {
        logDebug('Flow PKCE, exchangeCodeForSession...');
        try {
          const { data, error } = await client.auth.exchangeCodeForSession(fullUrl);
          if (error) {
            logDebug('Erreur: ' + error.message);
            disableForm('Lien invalide ou expiré.');
          } else if (data?.session) {
            logDebug('Session restaurée via PKCE');
            enableForm();
          }
        } catch (err) {
          logDebug('Exception: ' + err.message);
          disableForm('Lien invalide ou expiré.');
        }
        return;
      }

      // 3. Flow recovery avec token court dans le hash : #access_token=XXX&type=recovery
      // access_token est un token court (pas un JWT), il faut utiliser verifyOtp
      if (hashAccessToken && hashType === 'recovery') {
        logDebug('Flow recovery token court détecté, verifyOtp...');
        try {
          const { data, error } = await client.auth.verifyOtp({
            token_hash: hashAccessToken,
            type: 'recovery'
          });
          if (error) {
            logDebug('Erreur verifyOtp: ' + error.message);
            disableForm('Lien invalide ou expiré.');
          } else if (data?.session) {
            logDebug('Session restaurée via verifyOtp');
            enableForm();
          }
        } catch (err) {
          logDebug('Exception verifyOtp: ' + err.message);
          disableForm('Lien invalide ou expiré.');
        }
        return;
      }

      // 4. Flow implicite avec vrai JWT : #access_token=eyJ...&refresh_token=...
      if (hashAccessToken && hashAccessToken.startsWith('eyJ')) {
        logDebug('Flow implicite JWT, setSession...');
        try {
          const { data, error } = await client.auth.setSession({
            access_token: hashAccessToken,
            refresh_token: hashRefreshToken || ''
          });
          if (error) {
            logDebug('Erreur setSession: ' + error.message);
            disableForm('Lien invalide ou expiré.');
          } else if (data?.session) {
            logDebug('Session restaurée');
            enableForm();
          }
        } catch (err) {
          logDebug('Exception setSession: ' + err.message);
          disableForm('Lien invalide ou expiré.');
        }
        return;
      }

      // 5. Flow recovery avec token dans query string : ?token=XXX&type=recovery
      if (queryToken && queryType === 'recovery') {
        logDebug('Flow recovery query token, verifyOtp...');
        try {
          const { data, error } = await client.auth.verifyOtp({
            token_hash: queryToken,
            type: 'recovery'
          });
          if (error) {
            logDebug('Erreur: ' + error.message);
            disableForm('Lien invalide ou expiré.');
          } else if (data?.session) {
            logDebug('Session restaurée');
            enableForm();
          }
        } catch (err) {
          logDebug('Exception: ' + err.message);
          disableForm('Lien invalide ou expiré.');
        }
        return;
      }

      // 6. Aucun paramètre reconnu — attendre 5s
      logDebug('Aucun paramètre reconnu, attente 5s...');
      setTimeout(() => {
        if (!_recoveryReady) {
          disableForm('Lien de réinitialisation invalide ou expiré. Veuillez refaire une demande.');
        }
      }, 5000);
    });

    async function updatePassword() {
      const pwd = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorEl.textContent = '';

      if (pwd.length < 8) {
        errorEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
        return;
      }
      if (pwd !== confirmPwd) {
        errorEl.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      if (!_recoveryReady) {
        errorEl.textContent = 'Session expirée. Veuillez refaire une demande.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      try {
        const { error } = await client.auth.updateUser({ password: pwd });

        if (error) {
          errorEl.textContent = 'Erreur : ' + error.message;
          btn.disabled = false;
          btn.textContent = 'Enregistrer le mot de passe';
          return;
        }

        Swal.fire({
          title: 'Mot de passe mis à jour !',
          text: 'Vous allez être redirigé vers votre espace.',
          icon: 'success',
          timer: 2500,
          showConfirmButton: false
        }).then(() => {
          const referrer = document.referrer;
          if (referrer.includes('dashboard-client')) {
            window.location.href = '/dashboard-client.html';
          } else {
            window.location.href = '/dashboard-convoyeur.html';
          }
        });
      } catch (err) {
        errorEl.textContent = 'Erreur inattendue : ' + (err.message || '');
        btn.disabled = false;
        btn.textContent = 'Enregistrer le mot de passe';
      }
    }
  </script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/sw.js").catch(function(e) {
      console.warn("SW registration failed:", e);
    });
  });
}
</script>
</body>
</html>
