name: Weekly Data Pull

on:
  schedule:
    # Run every Monday at 07:00 UTC (09:00 Paris Summer / 08:00 Paris Winter)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

jobs:
  pull-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Weekly Export Script
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: node scripts/weekly-pull.js

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(ops): update weekly.json with GSC + Stripe data [skip ci]" && git push)
