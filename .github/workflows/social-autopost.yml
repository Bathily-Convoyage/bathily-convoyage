name: Social Media Auto-Post

on:
  schedule:
    # Tous les jours à 07:30 UTC (09:30 heure française d'hiver, 08:30 d'été)
    - cron: '30 7 * * *'
  workflow_dispatch: # Permet de déclencher la publication manuellement pour tester

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Autopost Script
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
        run: node scripts/post-to-buffer.js
