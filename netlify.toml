[build]
  publish = "."
  command = "echo 'Site statique - pas de build nécessaire'"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "https://bathily-convoyage.netlify.app/*"
  to = "https://bathily-convoyage.fr/:splat"
  status = 301
  force = true

# Redirection pour les routes sans extension .html
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  conditions = {Path = {exists = false}}

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com https://*.supabase.co https://code.tidio.co https://cdnjs.cloudflare.com https://*.cloudflare.com https://translate.google.com https://*.translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net https://translate.googleapis.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com https://code.tidio.co https://unpkg.com https://www.gstatic.com; img-src 'self' data: blob: https://images.pexels.com https://unpkg.com https://*.tile.openstreetmap.org https://*.supabase.co https://*.basemaps.cartocdn.com https://cdnjs.cloudflare.com https://twemoji.maxcdn.com https://cdn.jsdelivr.net https://*.twimg.com https://*.translate.google.com https://translate.googleapis.com https://www.google.com https://www.gstatic.com; media-src 'self' https://code.tidio.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api-adresse.data.gouv.fr https://api.stripe.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://*.tidio.co wss://*.tidio.co https://router.project-osrm.org https://translate.googleapis.com https://*.translate.google.com; frame-src 'self' https://js.stripe.com https://*.translate.google.com; worker-src blob: 'self';"

