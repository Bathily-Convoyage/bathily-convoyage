[build]
  command = "node scripts/generate-config.js && vite build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/reset-password.html"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "https://bathily-convoyage.netlify.app/*"
  to = "https://www.bathily-convoyage.fr/:splat"
  status = 301
  force = true

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
