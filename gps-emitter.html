<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A4D68">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Émetteur GPS — Bathily-Convoyage</title>
  <meta name="description" content="Émetteur GPS pour le convoyeur : partagez votre position en temps réel vers la plateforme Bathily.">
  <meta property="og:title" content="Émetteur GPS — Bathily-Convoyage">
  <meta property="og:description" content="Partagez votre position GPS en temps réel pendant la mission de convoyage.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    button, a, input, select, textarea { touch-action: manipulation; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FDFBF7;
      color: #2D2A24;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    :root {
      --bordeaux: #0A4D68;
      --bordeaux-dark: #063244;
      --bordeaux-light: #E6F0F4;
      --cream: #FDFBF7;
      --beige: #F9F6F0;
      --gray-dark: #2D2A24;
      --gray-mid: #6B625A;
      --border-light: #E8E1D9;
      --success: #4A7C6B;
      --warning: #F5A623;
      --danger: #e74c3c;
    }
    @media (hover: hover) {
      .cur {
        position: fixed;
        width: 8px;
        height: 8px;
        background: var(--bordeaux);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%)
      }
      .cur-ring {
        position: fixed;
        width: 32px;
        height: 32px;
        border: 1px solid rgba(122, 46, 26, .45);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%)
      }
    }
    @media (hover: none) {
      .cur,
      .cur-ring {
        display: none;
      }
    }
    .topbar {
      background: white;
      border-bottom: 1px solid var(--border-light);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--gray-dark);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .topbar-logo span {
      color: var(--bordeaux);
    }
    .topbar-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .topbar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray-mid);
    }
    .topbar-ref {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--bordeaux);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--gray-mid);
      text-decoration: none;
    }
    .tb-btn:hover {
      border-color: var(--bordeaux);
      color: var(--bordeaux);
    }
    .tb-btn.tb-red {
      background: var(--bordeaux);
      color: white;
      border: none;
    }
    .tb-btn.tb-red:hover {
      background: var(--bordeaux-dark);
    }
    .tb-btn.tb-success {
      background: var(--success);
      color: white;
      border: none;
    }
    .tb-btn.tb-success:hover {
      background: #3a6b5a;
    }
    .tb-btn.tb-danger {
      background: var(--danger);
      color: white;
      border: none;
    }
    .tb-btn.tb-danger:hover {
      background: #c0392b;
    }
    .main {
      flex: 1;
      display: flex;
      padding: 24px;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    @media (max-width: 900px) {
      .main {
        flex-direction: column;
        padding: 16px;
      }
    }
    /* Panneau gauche */
    .panel-left {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-right {
      flex: 1.5;
      min-width: 0;
      min-height: 400px;
      position: relative;
    }
    #map {
      height: 100%;
      min-height: 400px;
      border-radius: 24px;
      border: 1px solid var(--border-light);
      background: var(--beige);
    }
    @media (max-width: 900px) {
      .panel-right {
        min-height: 350px;
      }
      #map {
        min-height: 350px;
      }
    }
    .card {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 24px;
    }
    .card-title {
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--bordeaux);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-badge.active {
      background: rgba(74, 124, 107, 0.12);
      color: var(--success);
    }
    .status-badge.inactive {
      background: rgba(107, 98, 90, 0.1);
      color: var(--gray-mid);
    }
    .status-badge.error {
      background: rgba(231, 76, 60, 0.1);
      color: var(--danger);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-dot 1.5s infinite;
    }
    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.4;
        transform: scale(0.8);
      }
    }
    .status-dot.inactive {
      animation: none;
      opacity: 0.4;
    }
    .mission-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .mi-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .mi-lbl {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin-bottom: 2px;
    }
    .mi-val {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .coord-display {
      background: var(--beige);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .coord-display .label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray-mid);
      display: block;
      margin-bottom: 4px;
    }
    .coord-display .coords {
      color: var(--bordeaux);
    }
    .coord-display .accuracy {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--gray-mid);
      margin-top: 4px;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-item {
      text-align: center;
      padding: 12px;
      background: var(--beige);
      border-radius: 16px;
    }
    .stat-item .num {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--bordeaux);
    }
    .stat-item .lbl {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin-top: 2px;
    }
    .actions-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: var(--bordeaux);
      color: white;
    }
    .btn-primary:hover {
      background: var(--bordeaux-dark);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover {
      background: #3a6b5a;
      transform: translateY(-1px);
    }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--gray-mid);
    }
    .btn-outline:hover {
      border-color: var(--bordeaux);
      color: var(--bordeaux);
    }
    .log-container {
      max-height: 120px;
      overflow-y: auto;
      background: var(--beige);
      border-radius: 16px;
      padding: 12px;
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
    }
    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }
    .log-entry .time {
      color: var(--gray-mid);
      margin-right: 8px;
    }
    .log-entry .msg {
      color: var(--gray-dark);
    }
    .log-entry .msg.error {
      color: var(--danger);
    }
    .log-entry .msg.success {
      color: var(--success);
    }
    .alert {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.75rem;
      margin-bottom: 12px;
    }
    .alert-warn {
      background: rgba(224, 163, 67, 0.08);
      border: 1px solid rgba(224, 163, 67, 0.2);
      color: var(--warning);
    }
    .alert-info {
      background: rgba(41, 128, 185, 0.08);
      border: 1px solid rgba(41, 128, 185, 0.2);
      color: #2980b9;
    }
    .alert-success {
      background: rgba(74, 124, 107, 0.08);
      border: 1px solid rgba(74, 124, 107, 0.2);
      color: var(--success);
    }
    .alert-danger {
      background: rgba(231, 76, 60, 0.08);
      border: 1px solid rgba(231, 76, 60, 0.2);
      color: var(--danger);
    }
    .badge-ref {
      font-size: 0.6rem;
      font-weight: 700;
      background: var(--bordeaux-light);
      color: var(--bordeaux);
      padding: 2px 10px;
      border-radius: 40px;
      border: 1px solid var(--bordeaux);
    }
    @media print {
      .topbar,
      .actions-row,
      .btn {
        display: none !important;
      }
      body {
        background: white;
      }
      .card {
        border-color: #ddd !important;
      }
    }
  </style>
</head>
<body>

  <div class="cur" id="cur"></div>
  <div class="cur-ring" id="cring"></div>

  <div class="topbar">
    <a href="index.html" class="topbar-logo">Bathily-Convoyage<span>.</span></a>
    <div class="topbar-mid">
      <div class="topbar-title">Émetteur GPS</div>
      <div class="topbar-ref" id="topRef">Chargement...</div>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="window.location.href='bon-de-mission.html'"><i class="fas fa-arrow-left"></i> Retour</button>
      <button class="tb-btn tb-red" onclick="stopGPS()"><i class="fas fa-stop"></i> Arrêter</button>
    </div>
  </div>

  <div class="main">

    <!-- PANNEAU GAUCHE -->
    <div class="panel-left">

      <!-- Statut -->
      <div class="card">
        <div class="card-title"><i class="fas fa-satellite"></i> Statut du GPS</div>
        <div id="statusBadgeContainer">
          <span class="status-badge inactive" id="gpsStatus"><span class="status-dot inactive"></span> En attente de démarrage</span>
        </div>
        <div id="alertContainer"></div>
        <div class="coord-display">
          <span class="label">Position actuelle</span>
          <div class="coords" id="currentCoords">—</div>
          <div class="accuracy" id="accuracyDisplay">Précision : —</div>
        </div>
      </div>

      <!-- Informations mission -->
      <div class="card">
        <div class="card-title"><i class="fas fa-route"></i> Mission</div>
        <div class="mission-info-grid">
          <div class="mi-item"><div class="mi-lbl">Référence</div><div class="mi-val" id="missionRef">—</div></div>
          <div class="mi-item"><div class="mi-lbl">Véhicule</div><div class="mi-val" id="missionVehicle">—</div></div>
          <div class="mi-item" style="grid-column:span 2;"><div class="mi-lbl">Trajet</div><div class="mi-val" id="missionRoute">—</div></div>
          <div class="mi-item"><div class="mi-lbl">Statut mission</div><div class="mi-val" id="missionStatus">—</div></div>
          <div class="mi-item"><div class="mi-lbl">ID mission</div><div class="mi-val" style="font-size:0.7rem; word-break:break-all;" id="missionId">—</div></div>
        </div>
      </div>

      <!-- Statistiques -->
      <div class="card">
        <div class="card-title"><i class="fas fa-chart-line"></i> Statistiques</div>
        <div class="stats-row">
          <div class="stat-item"><div class="num" id="statUpdates">0</div><div class="lbl">Envois</div></div>
          <div class="stat-item"><div class="num" id="statDuration">0s</div><div class="lbl">Durée</div></div>
          <div class="stat-item"><div class="num" id="statSpeed">—</div><div class="lbl">Vitesse</div></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="card">
        <div class="card-title"><i class="fas fa-play"></i> Contrôle</div>
        <div class="actions-row">
          <button class="btn btn-success" id="startBtn" onclick="startGPS()"><i class="fas fa-play"></i> Démarrer le partage</button>
          <button class="btn btn-danger" id="stopBtn" onclick="stopGPS()" disabled><i class="fas fa-stop"></i> Arrêter</button>
          <button class="btn btn-outline" onclick="centerMap()"><i class="fas fa-crosshairs"></i> Centrer</button>
        </div>
      </div>

      <!-- Journal -->
      <div class="card">
        <div class="card-title"><i class="fas fa-list"></i> Journal</div>
        <div class="log-container" id="logContainer">
          <div class="log-entry"><span class="time">[—]</span><span class="msg">Prêt à démarrer le partage GPS.</span></div>
        </div>
      </div>

    </div>

    <!-- PANNEAU DROIT : CARTE -->
    <div class="panel-right">
      <div id="map"></div>
    </div>

  </div>

  <script>
    // ============================================================
    // PARTIE 1 : ÉTAT GLOBAL
    // ============================================================
    let map = null;
    let carMarker = null;
    let routeLine = null;
    let watchId = null;
    let isRunning = false;
    let updateCount = 0;
    let startTime = null;
    let timerInterval = null;
    let _missionRef = null;
    let _missionId = null;
    let _supabaseClient = null;
    let _isAuthChecked = false;

    // Firebase (pour le live GPS)
    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseRef = null;
    let firebaseSet = null;

    // ============================================================
    // PARTIE 2 : INITIALISATION
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      // Curseur
      if (window.matchMedia('(hover: hover)').matches) {
        const cur = document.getElementById('cur'),
          cring = document.getElementById('cring');
        let mx = 0,
          my = 0,
          rx = 0,
          ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX;
          my = e.clientY;
          cur.style.left = mx + 'px';
          cur.style.top = my + 'px' });
        (function loop() { rx += (mx - rx) * .11;
          ry += (my - ry) * .11;
          cring.style.left = rx + 'px';
          cring.style.top = ry + 'px';
          requestAnimationFrame(loop) })();
      }

      // Récupérer les paramètres
      const params = new URLSearchParams(window.location.search);
      _missionId = params.get('id');
      _missionRef = params.get('ref') || 'Mission';
      const route = params.get('route') || '—';
      const vehicle = params.get('vehicle') || '—';

      if (!_missionId) {
        addLog('⚠️ Aucun ID de mission fourni. Utilisation en mode démonstration.', 'error');
        document.getElementById('topRef').textContent = 'Aucune mission';
        document.getElementById('missionRef').textContent = '—';
        document.getElementById('missionVehicle').textContent = vehicle;
        document.getElementById('missionRoute').textContent = route;
        document.getElementById('missionId').textContent = '—';
        document.getElementById('missionStatus').textContent = '⚠️ Non défini';
        return;
      }

      // Remplir les infos
      document.getElementById('topRef').textContent = `${_missionRef} • ${vehicle} • ${route}`;
      document.getElementById('missionRef').textContent = _missionRef || '—';
      document.getElementById('missionVehicle').textContent = vehicle || '—';
      document.getElementById('missionRoute').textContent = route || '—';
      document.getElementById('missionId').textContent = _missionId;

      // Charger le statut de la mission depuis Supabase
      loadMissionStatus();

      // Initialiser la carte
      initMap();

      // Initialiser Firebase
      initFirebase();

      // Vérifier si une session GPS est déjà en cours (reprise)
      const saved = localStorage.getItem('bathily_gps_session');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.missionId === _missionId && data.isRunning) {
            // Reprise automatique
            addLog('🔄 Reprise de la session GPS précédente...', 'info');
            startGPS();
          }
        } catch (e) {}
      }

      addLog('✅ Émetteur GPS prêt.', 'success');
    });

    // ============================================================
    // PARTIE 3 : CARTE
    // ============================================================
    function initMap() {
      map = L.map('map').setView([46.5, 2.5], 6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      // Marqueur du véhicule
      const carIcon = L.divIcon({
        className: 'custom-car-marker',
        html: '<i class="fas fa-car" style="color:#0A4D68;font-size:32px;"></i>',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
      carMarker = L.marker([46.5, 2.5], { icon: carIcon }).addTo(map).bindPopup('🚗 Véhicule');
    }

    function updateMap(lat, lng) {
      if (carMarker) {
        carMarker.setLatLng([lat, lng]);
        // Ne pas centrer automatiquement pour ne pas gêner l'utilisateur
      }
    }

    function centerMap() {
      if (carMarker) {
        map.setView(carMarker.getLatLng(), 12);
      } else {
        map.setView([46.5, 2.5], 6);
      }
    }

    // ============================================================
    // PARTIE 4 : FIREBASE
    // ============================================================
    function initFirebase() {
      try {
        // Chargement dynamique de Firebase
        Promise.all([
          import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'),
          import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js')
        ]).then(([{ initializeApp }, { getDatabase, ref, set }]) => {
          const firebaseConfig = window.FIREBASE_CONFIG || {};
          firebaseApp = initializeApp(firebaseConfig);
          firebaseDb = getDatabase(firebaseApp);
          firebaseSet = set;
          if (_missionRef) {
            firebaseRef = ref(firebaseDb, `missions/${_missionRef}/gps/current`);
          }
          addLog('📡 Connexion Firebase établie.', 'success');
        }).catch(err => {
          addLog('⚠️ Firebase non disponible : ' + err.message, 'error');
        });
      } catch (err) {
        addLog('⚠️ Erreur Firebase : ' + err.message, 'error');
      }
    }

    // ============================================================
    // PARTIE 5 : GPS
    // ============================================================
    async function startGPS() {
      if (isRunning) {
        addLog('⚠️ Le partage GPS est déjà actif.', 'warning');
        return;
      }

      // Vérifier l'authentification Supabase avant d'autoriser l'envoi de positions
      if (!_isAuthChecked) {
        try {
          if (!_supabaseClient) _supabaseClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
          const { data: { session }, error: sessionError } = await _supabaseClient.auth.getSession();
          if (sessionError || !session) {
            addLog('⛔ Authentification requise pour partager la position GPS.', 'error');
            showAlert('danger', 'Vous devez être connecté en tant que convoyeur pour utiliser l\'émetteur GPS.');
            return;
          }
          _isAuthChecked = true;
        } catch (authErr) {
          addLog('⛔ Erreur d\'authentification : ' + (authErr.message || 'Accès refusé'), 'error');
          return;
        }
      }

      if (!navigator.geolocation) {
        addLog('❌ La géolocalisation n\'est pas supportée par ce navigateur.', 'error');
        showAlert('danger', 'La géolocalisation n\'est pas supportée par ce navigateur.');
        return;
      }

      // Demander la permission
      addLog('📡 Demande d\'accès à la géolocalisation...', 'info');

      // Options de géolocalisation
      const options = {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 5000
      };

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          handlePosition(position);
        },
        (error) => {
          handleGeoError(error);
        },
        options
      );

      // Mettre à jour l'état
      isRunning = true;
      startTime = Date.now();
      updateCount = 0;

      // UI
      document.getElementById('startBtn').disabled = true;
      document.getElementById('startBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> En cours...';
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('gpsStatus').className = 'status-badge active';
      document.getElementById('gpsStatus').innerHTML = '<span class="status-dot"></span> En cours de partage';
      document.getElementById('alertContainer').innerHTML = '';

      // Timer de durée
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (startTime) {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const mins = Math.floor(elapsed / 60);
          const secs = elapsed % 60;
          document.getElementById('statDuration').textContent = mins > 0 ? `${mins}m${secs}s` : `${secs}s`;
        }
      }, 1000);

      // Sauvegarder la session
      localStorage.setItem('bathily_gps_session', JSON.stringify({
        missionId: _missionId,
        isRunning: true,
        startTime: startTime
      }));

      addLog('✅ Partage GPS démarré. En attente de la première position...', 'success');
      showAlert('success', 'Partage GPS démarré. La position est envoyée en temps réel.');
    }

    function handlePosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = position.coords.accuracy || 0;
      const speed = position.coords.speed || 0; // m/s
      const speedKmh = Math.round(speed * 3.6);

      // Mise à jour de l'interface
      document.getElementById('currentCoords').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      document.getElementById('accuracyDisplay').textContent = `Précision : ±${Math.round(accuracy)} m`;
      document.getElementById('statSpeed').textContent = speedKmh > 0 ? `${speedKmh} km/h` : '—';

      // Carte
      updateMap(lat, lng);

      // Incrémenter le compteur
      updateCount++;
      document.getElementById('statUpdates').textContent = updateCount;

      // Envoyer vers Firebase
      if (firebaseRef && firebaseSet) {
        try {
            const data = {
              lat: lat,
              lng: lng,
              accuracy: Math.round(accuracy),
              speed: speed,
              speedKmh: speedKmh,
              timestamp: Date.now(),
              location: 'En transit'
            };
            firebaseSet(firebaseRef, data).then(() => {
              // Pas de log pour chaque envoi pour éviter le spam
            }).catch(err => {
              addLog('⚠️ Erreur envoi Firebase : ' + err.message, 'error');
            });
        } catch (err) {
          addLog('⚠️ Erreur envoi : ' + err.message, 'error');
        }
      } else {
        // Fallback : stocker dans localStorage
        try {
          const saved = JSON.parse(localStorage.getItem('bathily_gps_fallback') || '[]');
          saved.push({ lat, lng, timestamp: Date.now() });
          if (saved.length > 100) saved.shift();
          localStorage.setItem('bathily_gps_fallback', JSON.stringify(saved));
        } catch (e) {}
      }

      // Log toutes les 10 mises à jour
      if (updateCount % 10 === 0) {
        addLog(`📍 Position mise à jour (${updateCount} envois) : ${lat.toFixed(4)}, ${lng.toFixed(4)}`, 'info');
      }

      // Centrer la carte sur la position pour la première mise à jour
      if (updateCount === 1) {
        centerMap();
      }
    }

    function handleGeoError(error) {
      let msg = 'Erreur de géolocalisation : ';
      switch (error.code) {
        case error.PERMISSION_DENIED:
          msg += 'L\'utilisateur a refusé l\'accès à la localisation.';
          break;
        case error.POSITION_UNAVAILABLE:
          msg += 'La position est indisponible.';
          break;
        case error.TIMEOUT:
          msg += 'Délai d\'attente dépassé.';
          break;
        default:
          msg += error.message;
      }
      addLog('❌ ' + msg, 'error');
      showAlert('danger', msg);
    }

    function stopGPS() {
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      isRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      // UI
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').innerHTML = '<i class="fas fa-play"></i> Démarrer le partage';
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('gpsStatus').className = 'status-badge inactive';
      document.getElementById('gpsStatus').innerHTML = '<span class="status-dot inactive"></span> Arrêté';
      document.getElementById('statDuration').textContent = '0s';

      // Supprimer la session sauvegardée
      localStorage.removeItem('bathily_gps_session');

      // Mettre à jour Firebase avec un statut "arrêté"
      if (firebaseRef) {
        try {
          import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js').then(({ set }) => {
            set(firebaseRef, {
              status: 'stopped',
              timestamp: Date.now()
            }).catch(() => {});
          });
        } catch (e) {}
      }

      addLog('⏹️ Partage GPS arrêté.', 'info');
      showAlert('info', 'Le partage GPS a été arrêté.');
    }

    // ============================================================
    // PARTIE 6 : UTILITAIRES
    // ============================================================
    function addLog(msg, type = 'info') {
      const container = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const cls = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      entry.innerHTML = `<span class="time">[${time}]</span><span class="msg ${cls}">${msg}</span>`;
      container.appendChild(entry);
      // Garder les derniers 50 logs
      while (container.children.length > 50) {
        container.removeChild(container.firstChild);
      }
      container.scrollTop = container.scrollHeight;
    }

    function showAlert(type, message) {
      const container = document.getElementById('alertContainer');
      const alertClass = type === 'danger' ? 'alert-danger' : type === 'success' ? 'alert-success' : type === 'warning' ? 'alert-warn' : 'alert-info';
      const icon = type === 'danger' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
      container.innerHTML = `<div class="alert ${alertClass}"><i class="fas ${icon}"></i><p>${message}</p></div>`;
      // Auto-dismiss après 10s
      setTimeout(() => {
        if (container.querySelector('.alert')) {
          container.innerHTML = '';
        }
      }, 10000);
    }

    async function loadMissionStatus() {
      if (!_missionId) return;
      try {
        const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        const { data, error } = await client
          .from('missions')
          .select('status, paiement_statut')
          .eq('id', _missionId)
          .single();
        if (error || !data) {
          document.getElementById('missionStatus').textContent = '⚠️ Inconnu';
          return;
        }
        const status = data.status || 'planned';
        const statusMap = {
          'planned': 'Planifiée',
          'available': 'Disponible',
          'in_progress': 'En cours',
          'completed': 'Terminée',
          'cancelled': 'Annulée'
        };
        document.getElementById('missionStatus').textContent = `${statusMap[status] || status}`;
        if (data.paiement_statut === 'pending') {
          addLog('⚠️ Attention : la mission n\'est pas encore payée.', 'warning');
        }
      } catch (err) {
        document.getElementById('missionStatus').textContent = '⚠️ Erreur';
      }
    }

    // ============================================================
    // PARTIE 7 : GESTION DE LA FERMETURE / RECHARGE
    // ============================================================
    window.addEventListener('beforeunload', function(e) {
      if (isRunning) {
        // Ne pas bloquer la fermeture, mais arrêter le GPS
        if (watchId) {
          navigator.geolocation.clearWatch(watchId);
        }
        localStorage.removeItem('bathily_gps_session');
      }
    });

    // Exposer les fonctions globalement
    window.startGPS = startGPS;
    window.stopGPS = stopGPS;
    window.centerMap = centerMap;
  </script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/sw.js").catch(function(e) {
      console.warn("SW registration failed:", e);
    });
  });
}
</script>
